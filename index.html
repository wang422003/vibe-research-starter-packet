      --accent-hover: #0550ae;

    body {

      color: var(--text);
      line-height: 1.6;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }
    .lang-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
      padding: 1rem;
      background: var(--card);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .lang-bar span {
      font-size: 0.85rem;
      color: #57606a;
      margin-right: 0.5rem;
      align-self: center;
    }
    .lang-btn {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .lang-btn:hover {
      background: var(--border);
      border-color: var(--accent);
    }
    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }
    .content { display: none; }
    .content.active { display: block; }
    h1 { font-size: 2rem; margin-top: 0; }
    h2 { font-size: 1.5rem; margin-top: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    h3 { font-size: 1.2rem; margin-top: 1.5rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    blockquote { border-left: 4px solid var(--accent); margin: 1rem 0; padding-left: 1rem; color: #57606a; }
    ul, ol { padding-left: 1.5rem; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    th, td { border: 1px solid var(--border); padding: 0.6rem; text-align: left; }
    th { background: var(--card); }
    pre { background: var(--card); padding: 1rem; border-radius: 6px; overflow-x: auto; }
    .badges { margin: 1rem 0; }
    [dir="rtl"] { text-align: right; }
    [dir="rtl"] ul, [dir="rtl"] ol { padding-left: 0; padding-right: 1.5rem; }
    [dir="rtl"] blockquote { border-left: none; border-right: 4px solid var(--accent); padding-left: 0; padding-right: 1rem; }
  </style>

          <li><a href="#list">${get('curatedList')}</a></li>
          <li><a href="#featured">${get('featured')}</a></li>
          <li><a href="#contribute">${get('contribute')}</a></li>
          <li><a href="#principles">${get('principles')}</a></li>
          <li><a href="#license">${get('license')}</a></li>
        </ul>
        <h2 id="what">${get('whatIs')}</h2>
        <p>${get('whatIsDesc')}</p>
        <h2 id="who">${get('whoFor')}</h2>
        <ul>${get('whoForItems').map(i => `<li>${i}</li>`).join('')}</ul>
        <h2 id="routes">${get('routeCards')}</h2>
        <p>${get('routeCardsDesc')}</p>
        <h3>${get('beginnerRoute')}</h3>
        <blockquote><strong>Goal:</strong> ${get('beginnerGoal')}</blockquote>
        <ul>
          <li>Start with: <a href="${papers[0].url}">${papers[0].title}</a>, <a href="${papers[1].url}">${papers[1].title}</a>, <a href="${papers[2].url}">${papers[2].title}</a></li>
          <li>Then read: <a href="${papers[3].url}">${papers[3].title}</a></li>
        </ul>
        <h3>${get('builderRoute')}</h3>
        <blockquote><strong>Goal:</strong> ${get('builderGoal')}</blockquote>
        <ul>
          <li>Start with: <a href="${papers[3].url}">${papers[3].title}</a>, <a href="${papers[4].url}">${papers[4].title}</a>, <a href="${papers[5].url}">${papers[5].title}</a></li>
          <li>Pair with: <a href="${papers[10].url}">${papers[10].title}</a></li>
        </ul>
        <h3>${get('researcherRoute')}</h3>
        <blockquote><strong>Goal:</strong> ${get('researcherGoal')}</blockquote>
        <ul>
          <li>Start with: <a href="${papers[6].url}">${papers[6].title}</a>, <a href="${papers[7].url}">${papers[7].title}</a>, <a href="${papers[8].url}">${papers[8].title}</a>, <a href="${papers[9].url}">${papers[9].title}</a></li>
          <li>Evaluate with: <a href="${papers[11].url}">${papers[11].title}</a>, <a href="${papers[12].url}">${papers[12].title}</a>, <a href="${papers[13].url}">${papers[13].title}</a></li>
        </ul>
        <h2>${get('visualMap')}</h2>
        <p>${get('visualMapDesc')}</p>
        <pre><code>flowchart TD
visitor[NewVisitor] --> chooseRoute{ChooseRoute}
chooseRoute --> beginner[BeginnerRoute]
chooseRoute --> builder[BuilderRoute]
chooseRoute --> researcher[ResearcherRoute]
beginner --> surveys[Surveys]
builder --> synthesis[LiteratureSynthesis]
researcher --> benchmark[BenchmarkEvaluation]</code></pre>
        <h2 id="path">${get('recommendedPath')}</h2>
        <p>${get('recommendedPathDesc')}</p>
        <ol>
          ${papers.map((p, i) => `<li><a href="${p.url}">${p.title}</a></li>`).join('')}
        </ol>
        <h2>${get('legend')}</h2>
        <ul>
          <li><strong>${get('legendRec')}</strong>: ★★★★★ (must-read), ★★★★☆ (strongly recommended)</li>
          <li><strong>${get('legendStage')}</strong>: Beginner, Beginner-Intermediate, Intermediate</li>
        </ul>
        <h2 id="list">${get('curatedList')}</h2>
        <h3>1) ${get('surveys')}</h3>
        <table>
          <tr><th>#</th><th>Paper</th><th>Type</th></tr>
          ${papers.slice(0,3).map((p,i) => `<tr><td>${i+1}</td><td><a href="${p.url}">${p.title}</a></td><td>${p.type}</td></tr>`).join('')}
        </table>
        <h3>2) ${get('systems')}</h3>
        <table>
          <tr><th>#</th><th>Paper</th><th>Type</th></tr>
          ${papers.slice(3,6).map((p,i) => `<tr><td>${i+4}</td><td><a href="${p.url}">${p.title}</a></td><td>${p.type}</td></tr>`).join('')}
        </table>
        <h3>3) ${get('ideation')}</h3>

          <tr><th>#</th><th>Paper</th><th>Type</th></tr>
          ${papers.slice(6,10).map((p,i) => `<tr><td>${i+7}</td><td><a href="${p.url}">${p.title}</a></td><td>${p.type}</td></tr>`).join('')}
        </table>
        <h3>4) ${get('synthesis')}</h3>
        <table>
          <tr><th>#</th><th>Paper</th><th>Type</th></tr>
          <tr><td>11</td><td><a href="${papers[10].url}">${papers[10].title}</a></td><td>${papers[10].type}</td></tr>
        </table>
        <h3>5) ${get('benchmark')}</h3>
        <table>
          <tr><th>#</th><th>Paper</th><th>Type</th></tr>
          ${papers.slice(11,14).map((p,i) => `<tr><td>${i+12}</td><td><a href="${p.url}">${p.title}</a></td><td>${p.type}</td></tr>`).join('')}
        </table>
        <h2 id="featured">${get('featured')}</h2>
        <p>${get('featuredDesc')}</p>
        <ul>
          ${projects.map(p => `<li><a href="${p.url}">${p.name}</a></li>`).join('')}
        </ul>
        <h2 id="contribute">${get('contribute')}</h2>
        <ul>${get('contributeItems').map(i => `<li>${i}</li>`).join('')}</ul>
        <h2>${get('changelog')}</h2>
        <p>${get('changelogDesc')}</p>
        <p>2026-W12: Initial public release. Next: Add System + Benchmark papers.</p>
        <h2 id="principles">${get('principles')}</h2>
        <ol>${get('principlesItems').map(i => `<li>${i}</li>`).join('')}</ol>
        <h2 id="license">${get('license')}</h2>
        <p>${get('licenseText')}</p>
      `;
      return html;
    }

    const langs = ['en','zh','ko','ja','de','fr','es','it','pt','ar','th','vi','ru'];
    langs.forEach(lang => {
      const el = document.getElementById('content-' + lang);
      if (el) {
        const t = translations[lang] || otherLangs[lang];
        if (t && t.title) {
          el.innerHTML = '<h1>' + (t.title || translations.en.title) + '</h1>' + getContent(lang);
        } else {
          el.innerHTML = '<h1>' + translations.en.title + '</h1>' + getContent(lang);
        }
      }
    });

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const lang = btn.dataset.lang;
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        const content = document.getElementById('content-' + lang);
        if (content) {
          content.classList.add('active');
          content.parentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        }
        btn.classList.add('active');
        try { localStorage.setItem('vibe-lang', lang); } catch(e) {}
      });
    });

    const saved = localStorage.getItem('vibe-lang');
    if (saved && document.getElementById('content-' + saved)) {
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('content-' + saved).classList.add('active');
      document.querySelector('.lang-btn[data-lang="' + saved + '"]').classList.add('active');
    }
  </script>
</body>
</html>
