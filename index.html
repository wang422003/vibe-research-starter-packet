      margin: 0 auto;
      padding: 2rem;

      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
      padding: 1rem;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
    }
    .lang-bar span {
      font-size: 0.9rem;
      color: var(--muted);
      margin-right: 0.5rem;
      align-self: center;
    }
    .lang-btn {
      padding: 0.45rem 0.85rem;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.88);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

      margin: 1rem 0;

      text-align: left;

    th { background: #eef4fb; }

    .hero {
      background: var(--hero);
      color: #fff;
      padding: 2rem;
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.16);
      margin-bottom: 2rem;
      overflow: hidden;
      position: relative;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -80px auto;
      width: 220px;
      height: 220px;
      background: rgba(255,255,255,0.12);
      border-radius: 50%;
      filter: blur(2px);
    }
    .hero p, .hero a { color: rgba(255,255,255,0.92); }
    .hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .hero-link {
      display: inline-block;
      padding: 0.6rem 0.9rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
      color: #fff;
      font-weight: 600;
    }
    .hero-link:hover { text-decoration: none; background: rgba(255,255,255,0.22); }
    .section-intro {
      color: var(--muted);
      max-width: 760px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 1rem;
      margin: 1rem 0;
    }
    .card {
      grid-column: span 12;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1rem 1.1rem;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.05);
    }
    .card h3 { margin-top: 0; margin-bottom: 0.35rem; }
    .eyebrow {
      display: inline-block;
      margin-bottom: 0.5rem;
      padding: 0.22rem 0.55rem;
      border-radius: 999px;
      background: #e7f0fb;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .cta-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin: 1rem 0 0;
    }
    .cta-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.9rem;
      text-align: center;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
    }
    .callout {
      background: var(--accent-soft);
      border: 1px solid #c7d8ef;
      border-radius: 18px;
      padding: 1rem;
      margin: 1rem 0;
    }
    .section-note { color: var(--muted); }
    @media (min-width: 720px) {
      .span-4 { grid-column: span 4; }
      .span-6 { grid-column: span 6; }
      .span-3 { grid-column: span 3; }
    }
    @media (max-width: 820px) {
      .cta-strip { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      body { padding: 1rem; }
      .hero { padding: 1.35rem; border-radius: 18px; }
      h1 { font-size: 2rem; }
      .cta-strip { grid-template-columns: 1fr; }
    }
    [dir="rtl"] { text-align: right; }
    [dir="rtl"] ul, [dir="rtl"] ol { padding-left: 0; padding-right: 1.4rem; }
    [dir="rtl"] blockquote {
      border-left: none;
      border-right: 4px solid var(--accent-2);
    }
  </style>

    };

    const guideTracks = [
      ["Getting Started", "Start from a quick demo and move toward full automation", "./topics/getting-started.md"],
      ["Tools & Platforms", "Core tools, platforms, and workflow choices", "./topics/tools.md"],
      ["Claw Park", "What each Claw project is building and where it fits", "./topics/claw-park.md"],
      ["Vibe Coding", "Execution layer for repo work, code edits, and background agents", "./topics/vibe-coding.md"],
      ["Surveys", "Field overview and AI scientist landscape", "./topics/surveys.md"],
      ["Systems", "Representative end-to-end research systems", "./topics/systems.md"],
      ["Benchmarks", "Evaluation and rediscovery-style assessment", "./topics/benchmarks.md"],
      ["Vibe Anything", "Adjacent prompt-native workflows outside the core research track", "./topics/vibe-anything.md"]
    ];

    const clawProjects = [
      ["OpenClaw", "Gateway, control surface, skill registry, and compatible bundle platform", "Foundation platform", "https://github.com/openclaw/openclaw"],
      ["InnoClaw", "Grounded research workspace for files, paper study, and execution", "Research workspace", "https://github.com/SpectrAI-Initiative/InnoClaw"],
      ["ResearchClaw", "Daily research copilot for literature, notes, experiments, and writing", "Personal research copilot", "https://github.com/ymx10086/ResearchClaw"],
      ["ScienceClaw", "Self-evolving scientific research colleague with persistent memory", "Scientific specialist", "https://github.com/beita6969/ScienceClaw"],
      ["ScienceClaw (alt repo)", "Research-lab variant with broad agent and database coverage", "Research-lab variant", "https://github.com/Zaoqu-Liu/ScienceClaw"],
      ["MetaClaw", "Learns from real conversations and turns them into reusable skills", "Evolution engine", "https://github.com/aiming-lab/MetaClaw"],
      ["AutoResearchClaw", "Autonomous idea-to-paper pipeline with experiments and review", "Autonomous pipeline", "https://github.com/aiming-lab/AutoResearchClaw"],
      ["ResearchClaw Desktop App", "Local-first PDF chat and note-taking surface", "Reading surface", "https://noietch.github.io/ResearchClaw/"]
    ];

    const featuredProjects = [
      ["OpenAI Deep Research", "https://openai.com/index/introducing-deep-research/"],
      ["FutureHouse Platform", "https://www.futurehouse.org/research-announcements/launching-futurehouse-platform-ai-agents?_bhlid=b2b50af9254da4cf97bbad70959795fa728b14f6"],
      ["Agent Lightning", "https://github.com/microsoft/agent-lightning"],
      ["Agent0", "https://github.com/aiming-lab/Agent0"],
      ["AgentEvolver", "https://github.com/modelscope/AgentEvolver"],
      ["Acontext", "https://github.com/memodb-io/Acontext"],
      ["anthropics/skills", "https://github.com/anthropics/skills"],
      ["EvoScientist", "https://github.com/EvoScientist/EvoScientist"]
    ];

    const langButtons = ["en","zh","ko","ja","de","fr","es","it","pt","ar","th","vi","ru"];

    function getTranslation(lang, key) {
      const current = translations[lang] || translations.en;
      return current[key] !== undefined ? current[key] : translations.en[key];
    }

    function render(lang) {
      const guideRows = guideTracks.map(([topic, desc, link]) =>
        `<tr><td>${topic}</td><td>${desc}</td><td><a href="${link}">${link}</a></td></tr>`
      ).join("");
      const glanceCards = getTranslation(lang, "glanceCards").map(([title, text]) =>
        `<div class="card span-4"><span class="eyebrow">${title}</span><p>${text}</p></div>`
      ).join("");
      const pathRows = getTranslation(lang, "pathRows").map(([role, start, then]) =>
        `<div class="card span-6"><h3>${role}</h3><p><strong>Start:</strong> <a href="${start}">${start}</a></p><p><strong>Then:</strong> <a href="${then}">${then}</a></p></div>`
      ).join("");
      const ecosystemRows = getTranslation(lang, "ecosystemRows").map(([layer, examples, why]) =>
        `<div class="card span-6"><span class="eyebrow">${layer}</span><p><strong>Representative:</strong> ${examples}</p><p>${why}</p></div>`
      ).join("");
      const connectorRows = getTranslation(lang, "connectorRows").map(([layer, examples, why]) =>
        `<div class="card span-6"><span class="eyebrow">${layer}</span><p><strong>Representative:</strong> ${examples}</p><p>${why}</p></div>`
      ).join("");
      const learningRows = getTranslation(lang, "learningRows").map(([layer, examples, why]) =>
        `<div class="card span-6"><span class="eyebrow">${layer}</span><p><strong>Representative:</strong> ${examples}</p><p>${why}</p></div>`
      ).join("");
      const ccSignalRows = getTranslation(lang, "ccSignalRows").map(([layer, examples, why]) =>
        `<div class="card span-6"><span class="eyebrow">${layer}</span><p><strong>Representative:</strong> ${examples}</p><p>${why}</p></div>`
      ).join("");

      const clawRows = clawProjects.map(([name, summary, role, url]) =>
        `<tr><td><a href="${url}">${name}</a></td><td>${summary}</td><td>${role}</td></tr>`
      ).join("");

      const heroLinks = getTranslation(lang, "heroLinks").map((url, i) =>
        `<a class="hero-link" href="${url}">${getTranslation(lang, "heroLabels")[i]}</a>`
      ).join("");
      const modeCards = getTranslation(lang, "readingModeCards").map(([title, text]) =>
        `<div class="card span-4"><h3>${title}</h3><p>${text}</p></div>`
      ).join("");

      return `
        <div class="hero">
          <div class="badges">
            <a href="https://github.com/SpectrAI-Initiative/Vibe-Research-Guide/stargazers"><img src="https://img.shields.io/github/stars/SpectrAI-Initiative/Vibe-Research-Guide?style=social" alt="stars"></a>
            <a href="https://github.com/SpectrAI-Initiative/Vibe-Research-Guide/commits/main"><img src="https://img.shields.io/github/last-commit/SpectrAI-Initiative/Vibe-Research-Guide" alt="last commit"></a>
            <a href="https://github.com/SpectrAI-Initiative/Vibe-Research-Guide/issues"><img src="https://img.shields.io/github/issues/SpectrAI-Initiative/Vibe-Research-Guide" alt="issues"></a>
            <img src="https://img.shields.io/badge/License-MIT-yellow.svg" alt="MIT">
          </div>
          <h1>${getTranslation(lang, "title")}</h1>
          <blockquote>${getTranslation(lang, "subtitle")}</blockquote>
          <div class="hero-links">${heroLinks}</div>
        </div>

        <h2>${getTranslation(lang, "quickstart")}</h2>
        <ol>${getTranslation(lang, "quickstartSteps").map(step => `<li>${step}</li>`).join("")}</ol>

        <h2>${getTranslation(lang, "toc")}</h2>
        <ul>
          <li><a href="#what">${getTranslation(lang, "whatIs")}</a></li>
          <li><a href="#snapshot">${getTranslation(lang, "snapshot")}</a></li>
          <li><a href="#learning">${getTranslation(lang, "learning")}</a></li>
          <li><a href="#paths">${getTranslation(lang, "paths")}</a></li>
          <li><a href="#ecosystem">${getTranslation(lang, "ecosystem")}</a></li>
          <li><a href="#connectors">${getTranslation(lang, "connectors")}</a></li>
          <li><a href="#cc-signals">${getTranslation(lang, "ccSignals")}</a></li>
          <li><a href="#guides">${getTranslation(lang, "guides")}</a></li>
          <li><a href="#claw">${getTranslation(lang, "clawSection")}</a></li>
          <li><a href="#featured">${getTranslation(lang, "featured")}</a></li>
          <li><a href="#contribute">${getTranslation(lang, "contribute")}</a></li>
          <li><a href="#license">${getTranslation(lang, "license")}</a></li>
        </ul>

        <h2 id="what">${getTranslation(lang, "whatIs")}</h2>
        <p>${getTranslation(lang, "whatIsDesc")}</p>

        <h2>${getTranslation(lang, "glance")}</h2>
        <div class="grid">${glanceCards}</div>

        <h2 id="snapshot">${getTranslation(lang, "snapshot")}</h2>
        <ul>${getTranslation(lang, "snapshotItems").map(item => `<li>${item}</li>`).join("")}</ul>

        <h2 id="learning">${getTranslation(lang, "learning")}</h2>
        <p class="section-note">${getTranslation(lang, "learningNote")}</p>
        <div class="grid">${learningRows}</div>

        <h2 id="paths">${getTranslation(lang, "paths")}</h2>
        <div class="grid">${pathRows}</div>

        <h2 id="ecosystem">${getTranslation(lang, "ecosystem")}</h2>
        <div class="grid">${ecosystemRows}</div>

        <h2 id="connectors">${getTranslation(lang, "connectors")}</h2>
        <p class="section-note">${getTranslation(lang, "connectorNote")}</p>
        <div class="grid">${connectorRows}</div>

        <h2 id="cc-signals">${getTranslation(lang, "ccSignals")}</h2>
        <p class="section-note">${getTranslation(lang, "ccSignalNote")}</p>
        <div class="grid">${ccSignalRows}</div>

        <h2 id="guides">${getTranslation(lang, "guides")}</h2>
        <table>
          <tr><th>${getTranslation(lang, "guideTopic")}</th><th>${getTranslation(lang, "guideDesc")}</th><th>${getTranslation(lang, "guideLink")}</th></tr>
          ${guideRows}
        </table>

        <div class="callout">
          <strong>${getTranslation(lang, "clawPark")}:</strong> ${getTranslation(lang, "clawParkDesc")}
        </div>

        <h2 id="claw">${getTranslation(lang, "clawSection")}</h2>
        <p class="section-note">${getTranslation(lang, "clawNote")}</p>
        <table>
          <tr><th>Project</th><th>What it is doing</th><th>Role</th></tr>
          ${clawRows}
        </table>

        <h2 id="featured">${getTranslation(lang, "featured")}</h2>
        <div class="cta-strip">
          ${featuredProjects.map(([name, url]) => `<a class="cta-box" href="${url}">${name}</a>`).join("")}
        </div>

        <h2>${getTranslation(lang, "readingModes")}</h2>
        <div class="grid">${modeCards}</div>

        <h2 id="contribute">${getTranslation(lang, "contribute")}</h2>
        <ul>${getTranslation(lang, "contributeItems").map(item => `<li>${item}</li>`).join("")}</ul>

        <h2>${getTranslation(lang, "changelog")}</h2>
        <p>${getTranslation(lang, "changelogText")}</p>

        <h2 id="license">${getTranslation(lang, "license")}</h2>
        <p>${getTranslation(lang, "licenseText")}</p>
      `;
    }

    langButtons.forEach((lang) => {
      const el = document.getElementById("content-" + lang);
      if (el) el.innerHTML = render(lang);
    });

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const lang = btn.dataset.lang;
        document.querySelectorAll(".content").forEach((c) => c.classList.remove("active"));
        document.querySelectorAll(".lang-btn").forEach((b) => b.classList.remove("active"));
        const target = document.getElementById("content-" + lang);
        if (target) {
          target.classList.add("active");
          target.parentElement.dir = lang === "ar" ? "rtl" : "ltr";
        }
        btn.classList.add("active");
        try { localStorage.setItem("vibe-lang", lang); } catch (e) {}
      });
    });

    try {
      const saved = localStorage.getItem("vibe-lang");
      if (saved && document.getElementById("content-" + saved)) {
        document.querySelectorAll(".content").forEach((c) => c.classList.remove("active"));
        document.querySelectorAll(".lang-btn").forEach((b) => b.classList.remove("active"));
        document.getElementById("content-" + saved).classList.add("active");
        document.querySelector('.lang-btn[data-lang="' + saved + '"]').classList.add("active");
      }
    } catch (e) {}
  </script>
</body>
</html>
