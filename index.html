<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Research Guide</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #f6f8fa;
      --border: #d0d7de;
      --text: #24292f;
      --muted: #57606a;
      --accent: #0969da;
      --accent-soft: #dbeafe;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem;
    }
    .lang-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
      padding: 1rem;
      background: var(--card);
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .lang-bar span {
      font-size: 0.9rem;
      color: var(--muted);
      margin-right: 0.5rem;
      align-self: center;
    }
    .lang-btn {
      padding: 0.45rem 0.85rem;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .content { display: none; }
    .content.active { display: block; }
    h1 { font-size: 2.2rem; margin: 0 0 0.5rem; }
    h2 {
      font-size: 1.45rem;
      margin-top: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.35rem;
    }
    h3 { font-size: 1.1rem; margin-top: 1.4rem; }
    p { margin: 0.75rem 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    blockquote {
      margin: 1rem 0;
      padding: 0.8rem 1rem;
      border-left: 4px solid var(--accent);
      background: #fafcff;
      color: var(--muted);
    }
    ul, ol { padding-left: 1.4rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 0.7rem;
      text-align: left;
      vertical-align: top;
    }
    th { background: var(--card); }
    .badges { margin: 1rem 0; }
    .callout {
      background: var(--accent-soft);
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 1rem;
      margin: 1rem 0;
    }
    .section-note { color: var(--muted); }
    [dir="rtl"] { text-align: right; }
    [dir="rtl"] ul, [dir="rtl"] ol { padding-left: 0; padding-right: 1.4rem; }
    [dir="rtl"] blockquote {
      border-left: none;
      border-right: 4px solid var(--accent);
    }
  </style>
</head>
<body>
  <div class="lang-bar">
    <span>Language / 语言:</span>
    <button class="lang-btn active" data-lang="en">English</button>
    <button class="lang-btn" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="ko">한국어</button>
    <button class="lang-btn" data-lang="ja">日本語</button>
    <button class="lang-btn" data-lang="de">Deutsch</button>
    <button class="lang-btn" data-lang="fr">Français</button>
    <button class="lang-btn" data-lang="es">Español</button>
    <button class="lang-btn" data-lang="it">Italiano</button>
    <button class="lang-btn" data-lang="pt">Português</button>
    <button class="lang-btn" data-lang="ar">العربية</button>
    <button class="lang-btn" data-lang="th">ไทย</button>
    <button class="lang-btn" data-lang="vi">Tiếng Việt</button>
    <button class="lang-btn" data-lang="ru">Русский</button>
  </div>

  <div id="content-en" class="content active" data-lang="en"></div>
  <div id="content-zh" class="content" data-lang="zh"></div>
  <div id="content-ko" class="content" data-lang="ko"></div>
  <div id="content-ja" class="content" data-lang="ja"></div>
  <div id="content-de" class="content" data-lang="de"></div>
  <div id="content-fr" class="content" data-lang="fr"></div>
  <div id="content-es" class="content" data-lang="es"></div>
  <div id="content-it" class="content" data-lang="it"></div>
  <div id="content-pt" class="content" data-lang="pt"></div>
  <div id="content-ar" class="content" data-lang="ar" dir="rtl"></div>
  <div id="content-th" class="content" data-lang="th"></div>
  <div id="content-vi" class="content" data-lang="vi"></div>
  <div id="content-ru" class="content" data-lang="ru"></div>

  <script>
    const translations = {
      en: {
        title: "Vibe Research Guide",
        subtitle: "A curated multilingual guide for Vibe Research, Claw ecosystem navigation, Vibe Coding, and adjacent prompt-native workflows.",
        quickstart: "Quick Start",
        quickstartSteps: [
          "If you are new to the field, start from Getting Started and Tools & Platforms.",
          "If you are comparing Claw projects, go straight to Claw Park.",
          "If you care about execution, read Vibe Coding after the main research pages."
        ],
        toc: "Table of Contents",
        whatIs: "What is Vibe Research?",
        whatIsDesc: "Vibe Research studies how LLM-based agents can support or automate the research loop: literature review, idea generation, experiment execution, writing, and evaluation.",
        snapshot: "2026 Landscape Snapshot",
        snapshotItems: [
          "Research copilots are getting stronger through Deep Research, NotebookLM-style source grounding, and scientific workspaces such as Prism.",
          "Autonomous research systems are maturing through AI Scientist-v2, Agent Laboratory, and EvoScientist.",
          "Vibe Coding is becoming the execution layer for research automation, especially when agents need to inspect repos, edit files, and run experiments."
        ],
        paths: "Choose a Path",
        pathRole: "Who you are",
        pathStart: "Start here",
        pathThen: "Then read",
        pathRows: [
          ["New to Vibe Research", "./topics/getting-started.md", "./topics/tools.md"],
          ["Developer / Builder", "./topics/tools.md", "./topics/vibe-coding.md"],
          ["Researcher", "./topics/surveys.md", "./topics/benchmarks.md"],
          ["Creator / Operator", "./topics/vibe-anything.md", "./topics/vibe-coding.md"]
        ],
        ecosystem: "Ecosystem Snapshot",
        ecosystemRows: [
          ["Research copilots", "Deep Research, NotebookLM, Prism", "Fast reading, synthesis, and writing assistance"],
          ["Research systems", "InnoClaw, ResearchClaw, FARS, AI Scientist, Agent Laboratory, EvoScientist", "End-to-end research assistance and automation"],
          ["Claw ecosystem", "OpenClaw, ScienceClaw, MetaClaw, AutoResearchClaw", "Foundation, specialization, learning, and autonomy layers"],
          ["Execution layer", "Claude Code, Codex, Cursor Background Agents, Copilot Coding Agent", "Repo and coding workflows that power execution"],
          ["Adjacent tools", "v0, Lovable, Replit Agent", "Useful prototyping tools outside the research core"]
        ],
        guides: "Guide Map",
        guideTopic: "Topic",
        guideDesc: "Description",
        guideLink: "Link",
        clawPark: "Claw Park",
        clawParkDesc: "An ecosystem map for what each Claw project is building and where it fits.",
        clawSection: "Claw Park Preview",
        clawNote: "Use Claw Park when the names start to blur together. The key is to separate foundation, workspace, copilot, evolution, and autonomy layers.",
        featured: "Featured Projects",
        contribute: "How to Contribute",
        contributeItems: [
          "Suggest a resource via the Resource Suggestion issue template.",
          "Submit updates through Pull Requests with clear metadata.",
          "Follow the curation guidelines in docs/curation-guidelines.md."
        ],
        changelog: "Recent Updates",
        changelogText: "2026-W12: added Claw Park, Vibe Coding, Vibe Anything, and a refreshed 2026 landscape snapshot.",
        license: "License",
        licenseText: "MIT (see LICENSE)."
      },
      zh: {
        title: "Vibe Research 技术指南",
        subtitle: "一个面向 Vibe Research、Claw 生态导航、Vibe Coding 与周边 prompt-native 工作流的多语言指南。",
        quickstart: "快速开始",
        quickstartSteps: [
          "如果你刚入门，先看 Getting Started 和 Tools & Platforms。",
          "如果你在比较不同 Claw 项目，直接看 Claw Park。",
          "如果你关心执行层，读完科研主线后再看 Vibe Coding。"
        ],
        toc: "目录",
        whatIs: "什么是 Vibe Research？",
        whatIsDesc: "Vibe Research 研究 LLM Agent 如何支持或自动化科研闭环：文献综述、idea 生成、实验执行、论文写作与评测。",
        snapshot: "2026 版图速览",
        snapshotItems: [
          "Research copilot 正在变强，Deep Research、NotebookLM 式溯源阅读和 Prism 这类科学写作空间正在加速文献综合。",
          "自主科研系统正在成熟，AI Scientist-v2、Agent Laboratory、EvoScientist 正在把系统推进到更强的 ideation、execution 和 evaluation。",
          "Vibe Coding 正成为研究自动化的执行层，因为 agent 越来越需要真实地读 repo、改文件和跑实验。"
        ],
        paths: "选择路径",
        pathRole: "你是谁",
        pathStart: "先看",
        pathThen: "然后读",
        pathRows: [
          ["刚入门 Vibe Research", "./topics/getting-started.md", "./topics/tools.md"],
          ["开发者 / Builder", "./topics/tools.md", "./topics/vibe-coding.md"],
          ["研究者", "./topics/surveys.md", "./topics/benchmarks.md"],
          ["Creator / Operator", "./topics/vibe-anything.md", "./topics/vibe-coding.md"]
        ],
        ecosystem: "生态速览",
        ecosystemRows: [
          ["Research copilots", "Deep Research、NotebookLM、Prism", "更快的阅读、综合和科学写作辅助"],
          ["Research systems", "InnoClaw、ResearchClaw、FARS、AI Scientist、Agent Laboratory、EvoScientist", "端到端科研辅助和自动化"],
          ["Claw ecosystem", "OpenClaw、ScienceClaw、MetaClaw、AutoResearchClaw", "基础层、专业层、学习层和自治层"],
          ["Execution layer", "Claude Code、Codex、Cursor Background Agents、Copilot Coding Agent", "支撑执行的 repo 与 coding workflow 层"],
          ["Adjacent tools", "v0、Lovable、Replit Agent", "对原型有用，但不属于科研主线"]
        ],
        guides: "Guide 地图",
        guideTopic: "主题",
        guideDesc: "说明",
        guideLink: "链接",
        clawPark: "Claw Park",
        clawParkDesc: "解释每个 Claw 在做什么，以及它在生态中的位置。",
        clawSection: "Claw Park 预览",
        clawNote: "当你开始分不清各种 Claw 名字时，就看这个版块。关键是把基础层、workspace、copilot、evolution 和 autonomy 分开。",
        featured: "重点项目",
        contribute: "如何贡献",
        contributeItems: [
          "通过 Resource Suggestion issue 模板提交资源。",
          "通过 Pull Request 提交更新并附清晰元数据。",
          "遵循 docs/curation-guidelines.md 中的选编标准。"
        ],
        changelog: "最近更新",
        changelogText: "2026-W12：新增 Claw Park、Vibe Coding、Vibe Anything，并刷新 2026 版图概览。",
        license: "许可证",
        licenseText: "MIT（见 LICENSE）。"
      }
    };

    const guideTracks = [
      ["Getting Started", "Start from a quick demo and move toward full automation", "./topics/getting-started.md"],
      ["Tools & Platforms", "Core tools, platforms, and workflow choices", "./topics/tools.md"],
      ["Claw Park", "What each Claw project is building and where it fits", "./topics/claw-park.md"],
      ["Vibe Coding", "Execution layer for repo work, code edits, and background agents", "./topics/vibe-coding.md"],
      ["Surveys", "Field overview and AI scientist landscape", "./topics/surveys.md"],
      ["Systems", "Representative end-to-end research systems", "./topics/systems.md"],
      ["Benchmarks", "Evaluation and rediscovery-style assessment", "./topics/benchmarks.md"],
      ["Vibe Anything", "Adjacent prompt-native workflows outside the core research track", "./topics/vibe-anything.md"]
    ];

    const clawProjects = [
      ["OpenClaw", "General assistant platform and skill ecosystem", "Foundation framework", "https://github.com/openclaw/openclaw"],
      ["InnoClaw", "Grounded research workspace for files, paper study, and execution", "Research workspace", "https://github.com/SpectrAI-Initiative/InnoClaw"],
      ["ResearchClaw", "Daily research copilot for literature, notes, experiments, and writing", "Personal research copilot", "https://github.com/ymx10086/ResearchClaw"],
      ["ScienceClaw", "Self-evolving scientific research colleague with persistent memory", "Scientific specialist", "https://github.com/beita6969/ScienceClaw"],
      ["ScienceClaw (alt repo)", "Research-lab variant with broad agent and database coverage", "Research-lab variant", "https://github.com/Zaoqu-Liu/ScienceClaw"],
      ["MetaClaw", "Learns from real conversations and turns them into reusable skills", "Evolution engine", "https://github.com/aiming-lab/MetaClaw"],
      ["AutoResearchClaw", "Autonomous idea-to-paper pipeline with experiments and review", "Autonomous pipeline", "https://github.com/aiming-lab/AutoResearchClaw"],
      ["ResearchClaw Desktop App", "Local-first PDF chat and note-taking surface", "Reading surface", "https://noietch.github.io/ResearchClaw/"]
    ];

    const featuredProjects = [
      ["OpenAI Deep Research", "https://openai.com/index/introducing-deep-research/"],
      ["Gemini Deep Research", "https://blog.google/products/gemini/google-gemini-deep-research/"],
      ["Prism", "https://openai.com/prism/"],
      ["AI Scientist-v2", "https://arxiv.org/abs/2504.08066"],
      ["Agent Laboratory", "https://arxiv.org/abs/2501.04227"],
      ["EvoScientist", "https://github.com/EvoScientist/EvoScientist"]
    ];

    const langButtons = ["en","zh","ko","ja","de","fr","es","it","pt","ar","th","vi","ru"];

    function getTranslation(lang, key) {
      const current = translations[lang] || translations.en;
      return current[key] !== undefined ? current[key] : translations.en[key];
    }

    function render(lang) {
      const guideRows = guideTracks.map(([topic, desc, link]) =>
        `<tr><td>${topic}</td><td>${desc}</td><td><a href="${link}">${link}</a></td></tr>`
      ).join("");
      const pathRows = getTranslation(lang, "pathRows").map(([role, start, then]) =>
        `<tr><td>${role}</td><td><a href="${start}">${start}</a></td><td><a href="${then}">${then}</a></td></tr>`
      ).join("");
      const ecosystemRows = getTranslation(lang, "ecosystemRows").map(([layer, examples, why]) =>
        `<tr><td>${layer}</td><td>${examples}</td><td>${why}</td></tr>`
      ).join("");

      const clawRows = clawProjects.map(([name, summary, role, url]) =>
        `<tr><td><a href="${url}">${name}</a></td><td>${summary}</td><td>${role}</td></tr>`
      ).join("");

      const featured = featuredProjects.map(([name, url]) => `<li><a href="${url}">${name}</a></li>`).join("");

      return `
        <div class="badges">
          <a href="https://github.com/SpectrAI-Initiative/Vibe-Research-Guide/stargazers"><img src="https://img.shields.io/github/stars/SpectrAI-Initiative/Vibe-Research-Guide?style=social" alt="stars"></a>
          <a href="https://github.com/SpectrAI-Initiative/Vibe-Research-Guide/commits/main"><img src="https://img.shields.io/github/last-commit/SpectrAI-Initiative/Vibe-Research-Guide" alt="last commit"></a>
          <a href="https://github.com/SpectrAI-Initiative/Vibe-Research-Guide/issues"><img src="https://img.shields.io/github/issues/SpectrAI-Initiative/Vibe-Research-Guide" alt="issues"></a>
          <img src="https://img.shields.io/badge/License-MIT-yellow.svg" alt="MIT">
        </div>
        <h1>${getTranslation(lang, "title")}</h1>
        <blockquote>${getTranslation(lang, "subtitle")}</blockquote>

        <h2>${getTranslation(lang, "quickstart")}</h2>
        <ol>${getTranslation(lang, "quickstartSteps").map(step => `<li>${step}</li>`).join("")}</ol>

        <h2>${getTranslation(lang, "toc")}</h2>
        <ul>
          <li><a href="#what">${getTranslation(lang, "whatIs")}</a></li>
          <li><a href="#snapshot">${getTranslation(lang, "snapshot")}</a></li>
          <li><a href="#paths">${getTranslation(lang, "paths")}</a></li>
          <li><a href="#ecosystem">${getTranslation(lang, "ecosystem")}</a></li>
          <li><a href="#guides">${getTranslation(lang, "guides")}</a></li>
          <li><a href="#claw">${getTranslation(lang, "clawSection")}</a></li>
          <li><a href="#featured">${getTranslation(lang, "featured")}</a></li>
          <li><a href="#contribute">${getTranslation(lang, "contribute")}</a></li>
          <li><a href="#license">${getTranslation(lang, "license")}</a></li>
        </ul>

        <h2 id="what">${getTranslation(lang, "whatIs")}</h2>
        <p>${getTranslation(lang, "whatIsDesc")}</p>

        <h2 id="snapshot">${getTranslation(lang, "snapshot")}</h2>
        <ul>${getTranslation(lang, "snapshotItems").map(item => `<li>${item}</li>`).join("")}</ul>

        <h2 id="paths">${getTranslation(lang, "paths")}</h2>
        <table>
          <tr><th>${getTranslation(lang, "pathRole")}</th><th>${getTranslation(lang, "pathStart")}</th><th>${getTranslation(lang, "pathThen")}</th></tr>
          ${pathRows}
        </table>

        <h2 id="ecosystem">${getTranslation(lang, "ecosystem")}</h2>
        <table>
          <tr><th>Layer</th><th>Representative projects</th><th>Why it matters</th></tr>
          ${ecosystemRows}
        </table>

        <h2 id="guides">${getTranslation(lang, "guides")}</h2>
        <table>
          <tr><th>${getTranslation(lang, "guideTopic")}</th><th>${getTranslation(lang, "guideDesc")}</th><th>${getTranslation(lang, "guideLink")}</th></tr>
          ${guideRows}
        </table>

        <div class="callout">
          <strong>${getTranslation(lang, "clawPark")}:</strong> ${getTranslation(lang, "clawParkDesc")}
        </div>

        <h2 id="claw">${getTranslation(lang, "clawSection")}</h2>
        <p class="section-note">${getTranslation(lang, "clawNote")}</p>
        <table>
          <tr><th>Project</th><th>What it is doing</th><th>Role</th></tr>
          ${clawRows}
        </table>

        <h2 id="featured">${getTranslation(lang, "featured")}</h2>
        <ul>${featured}</ul>

        <h2 id="contribute">${getTranslation(lang, "contribute")}</h2>
        <ul>${getTranslation(lang, "contributeItems").map(item => `<li>${item}</li>`).join("")}</ul>

        <h2>${getTranslation(lang, "changelog")}</h2>
        <p>${getTranslation(lang, "changelogText")}</p>

        <h2 id="license">${getTranslation(lang, "license")}</h2>
        <p>${getTranslation(lang, "licenseText")}</p>
      `;
    }

    langButtons.forEach((lang) => {
      const el = document.getElementById("content-" + lang);
      if (el) el.innerHTML = render(lang);
    });

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const lang = btn.dataset.lang;
        document.querySelectorAll(".content").forEach((c) => c.classList.remove("active"));
        document.querySelectorAll(".lang-btn").forEach((b) => b.classList.remove("active"));
        const target = document.getElementById("content-" + lang);
        if (target) {
          target.classList.add("active");
          target.parentElement.dir = lang === "ar" ? "rtl" : "ltr";
        }
        btn.classList.add("active");
        try { localStorage.setItem("vibe-lang", lang); } catch (e) {}
      });
    });

    try {
      const saved = localStorage.getItem("vibe-lang");
      if (saved && document.getElementById("content-" + saved)) {
        document.querySelectorAll(".content").forEach((c) => c.classList.remove("active"));
        document.querySelectorAll(".lang-btn").forEach((b) => b.classList.remove("active"));
        document.getElementById("content-" + saved).classList.add("active");
        document.querySelector('.lang-btn[data-lang="' + saved + '"]').classList.add("active");
      }
    } catch (e) {}
  </script>
</body>
</html>
